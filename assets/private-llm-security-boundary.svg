<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/></filter>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/></marker>
<linearGradient id="soft" x1="0" x2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
</defs>
<rect x="0" y="0" width="1400" height="900" fill="#f8fafc"/>
<circle cx="1270" cy="80" r="190" fill="#dbeafe" opacity="0.38"/>
<circle cx="80" cy="820" r="160" fill="#e0f2fe" opacity="0.45"/>
<text x="56" y="72" font-size="36" fill="#0f172a" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif">Private LLM Security Boundary</text>
<text x="58" y="108" font-size="17" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif">The API sees the caller; the model never sees an unrestricted client</text>
<rect x="90" y="190" width="260" height="220" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="120" cy="222" r="16" fill="#0891b2"/>
<text x="120" y="228" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">1</text>
<rect x="148" y="212" width="42" height="5" rx="3" fill="#0891b2"/>
<text x="148" y="242" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Client Surface</text>
<text x="114" y="286" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Test console, partner app, mobile</text>
<text x="114" y="305" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">PWA, or integration client.</text>
<rect x="410" y="190" width="260" height="220" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="440" cy="222" r="16" fill="#2563eb"/>
<text x="440" y="228" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">2</text>
<rect x="468" y="212" width="42" height="5" rx="3" fill="#2563eb"/>
<text x="468" y="242" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Secure API Gateway</text>
<text x="434" y="286" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Token checks, scopes, quota,</text>
<text x="434" y="305" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">request limits, audit policy.</text>
<rect x="730" y="190" width="260" height="220" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="760" cy="222" r="16" fill="#7c3aed"/>
<text x="760" y="228" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">3</text>
<rect x="788" y="212" width="42" height="5" rx="3" fill="#7c3aed"/>
<text x="788" y="242" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Private LLM Route</text>
<text x="754" y="286" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Local or company-private endpoint.</text>
<text x="754" y="305" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Secrets stay server-side.</text>
<rect x="1050" y="190" width="260" height="220" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="1080" cy="222" r="16" fill="#16a34a"/>
<text x="1080" y="228" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">4</text>
<rect x="1108" y="212" width="42" height="5" rx="3" fill="#16a34a"/>
<text x="1108" y="242" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">CMMS Draft Result</text>
<text x="1074" y="286" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Structured output, validation</text>
<text x="1074" y="305" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">status, warnings, next action.</text>
<line x1="350" y1="300" x2="398" y2="300" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="670" y1="300" x2="718" y2="300" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="990" y1="300" x2="1038" y2="300" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="410" y="510" width="580" height="190" rx="24" fill="#fff7ed" stroke="#fed7aa" filter="url(#shadow)"/>
<text x="455" y="565" font-size="24" fill="#0f172a" font-weight="800" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">What stays hidden</text>
<rect x="455" y="615" width="145" height="34" rx="17.0" fill="#f97316" opacity="0.10" stroke="#f97316" stroke-opacity="0.35"/><text x="527.5" y="637.0" text-anchor="middle" font-size="13" fill="#f97316" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">provider secret</text>
<rect x="625" y="615" width="145" height="34" rx="17.0" fill="#f97316" opacity="0.10" stroke="#f97316" stroke-opacity="0.35"/><text x="697.5" y="637.0" text-anchor="middle" font-size="13" fill="#f97316" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">model route</text>
<rect x="795" y="615" width="145" height="34" rx="17.0" fill="#f97316" opacity="0.10" stroke="#f97316" stroke-opacity="0.35"/><text x="867.5" y="637.0" text-anchor="middle" font-size="13" fill="#f97316" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">raw token</text>
<rect x="455" y="667" width="145" height="34" rx="17.0" fill="#f97316" opacity="0.10" stroke="#f97316" stroke-opacity="0.35"/><text x="527.5" y="689.0" text-anchor="middle" font-size="13" fill="#f97316" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">private prompt</text>
<rect x="625" y="667" width="145" height="34" rx="17.0" fill="#f97316" opacity="0.10" stroke="#f97316" stroke-opacity="0.35"/><text x="697.5" y="689.0" text-anchor="middle" font-size="13" fill="#f97316" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">full payload logs</text>
</svg>