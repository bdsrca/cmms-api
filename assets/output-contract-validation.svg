<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/></filter>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/></marker>
<linearGradient id="soft" x1="0" x2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
</defs>
<rect x="0" y="0" width="1400" height="900" fill="#f8fafc"/>
<circle cx="1270" cy="80" r="190" fill="#dbeafe" opacity="0.38"/>
<circle cx="80" cy="820" r="160" fill="#e0f2fe" opacity="0.45"/>
<text x="56" y="72" font-size="36" fill="#0f172a" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif">Output Contract and CMMS Validation</text>
<text x="58" y="108" font-size="17" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif">Two checks, two different jobs</text>
<rect x="100" y="220" width="250" height="210" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="130" cy="252" r="16" fill="#7c3aed"/>
<text x="130" y="258" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">1</text>
<rect x="158" y="242" width="42" height="5" rx="3" fill="#7c3aed"/>
<text x="158" y="272" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Model output</text>
<text x="124" y="316" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">The model proposes JSON fields from</text>
<text x="124" y="335" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">natural language.</text>
<rect x="430" y="220" width="250" height="210" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="460" cy="252" r="16" fill="#2563eb"/>
<text x="460" y="258" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">2</text>
<rect x="488" y="242" width="42" height="5" rx="3" fill="#2563eb"/>
<text x="488" y="272" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Output contract</text>
<text x="454" y="316" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Checks required fields, types, and</text>
<text x="454" y="335" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">unexpected data.</text>
<rect x="760" y="220" width="250" height="210" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="790" cy="252" r="16" fill="#f97316"/>
<text x="790" y="258" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">3</text>
<rect x="818" y="242" width="42" height="5" rx="3" fill="#f97316"/>
<text x="818" y="272" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Environment rules</text>
<text x="784" y="316" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Checks CMMS codes, aliases,</text>
<text x="784" y="335" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">disabled values, and severity.</text>
<rect x="1090" y="220" width="230" height="210" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="1120" cy="252" r="16" fill="#16a34a"/>
<text x="1120" y="258" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">4</text>
<rect x="1148" y="242" width="42" height="5" rx="3" fill="#16a34a"/>
<text x="1148" y="272" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Draft response</text>
<text x="1114" y="316" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Valid, warning, or blocked with</text>
<text x="1114" y="335" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">reasons.</text>
<line x1="350" y1="325" x2="418" y2="325" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="680" y1="325" x2="748" y2="325" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1010" y1="325" x2="1078" y2="325" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="180" y="560" width="1040" height="120" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="230" y="620" font-size="24" fill="#0f172a" font-weight="800" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Why separate them?</text>
<text x="500" y="620" font-size="18" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">A response can be valid JSON but still invalid for a specific CMMS</text>
<text x="500" y="640" font-size="18" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">environment. The API must catch both cases.</text>
</svg>