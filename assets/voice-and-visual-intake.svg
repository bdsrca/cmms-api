<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/></filter>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/></marker>
<linearGradient id="soft" x1="0" x2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
</defs>
<rect x="0" y="0" width="1400" height="900" fill="#f8fafc"/>
<circle cx="1270" cy="80" r="190" fill="#dbeafe" opacity="0.38"/>
<circle cx="80" cy="820" r="160" fill="#e0f2fe" opacity="0.45"/>
<text x="56" y="72" font-size="36" fill="#0f172a" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif">Voice and Visual Intake</text>
<text x="58" y="108" font-size="17" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif">Different inputs, same controlled validation pipeline</text>
<rect x="90" y="180" width="260" height="190" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="120" cy="212" r="16" fill="#0891b2"/>
<text x="120" y="218" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">1</text>
<rect x="148" y="202" width="42" height="5" rx="3" fill="#0891b2"/>
<text x="148" y="232" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Voice request</text>
<text x="114" y="276" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Speech becomes an editable</text>
<text x="114" y="295" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">transcript before API submission.</text>
<rect x="90" y="430" width="260" height="190" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="120" cy="462" r="16" fill="#7c3aed"/>
<text x="120" y="468" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">2</text>
<rect x="148" y="452" width="42" height="5" rx="3" fill="#7c3aed"/>
<text x="148" y="482" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Screenshot / photo</text>
<text x="114" y="526" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Visible text and context hints are</text>
<text x="114" y="545" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">extracted first.</text>
<rect x="470" y="300" width="260" height="190" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="500" cy="332" r="16" fill="#2563eb"/>
<text x="500" y="338" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">3</text>
<rect x="528" y="322" width="42" height="5" rx="3" fill="#2563eb"/>
<text x="528" y="352" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Shared intake API</text>
<text x="494" y="396" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Both input types become a</text>
<text x="494" y="415" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">normalized draft request.</text>
<rect x="850" y="300" width="260" height="190" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="880" cy="332" r="16" fill="#f97316"/>
<text x="880" y="338" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">4</text>
<rect x="908" y="322" width="42" height="5" rx="3" fill="#f97316"/>
<text x="908" y="352" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Validation package</text>
<text x="874" y="396" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Contract, environment, policy, and</text>
<text x="874" y="415" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">confidence checks.</text>
<rect x="1160" y="300" width="160" height="190" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="1190" cy="332" r="16" fill="#16a34a"/>
<text x="1190" y="338" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">5</text>
<rect x="1218" y="322" width="42" height="5" rx="3" fill="#16a34a"/>
<text x="1218" y="352" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Review</text>
<text x="1184" y="396" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">User approves or edits.</text>
<line x1="350" y1="275" x2="458" y2="360" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="350" y1="525" x2="458" y2="410" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="730" y1="395" x2="838" y2="395" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<line x1="1110" y1="395" x2="1148" y2="395" stroke="#2563eb" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="150" y="695" width="1100" height="74" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
<text x="190" y="740" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Future feature boundary: image or voice can create a draft with evidence, but should not silently create a</text>
<text x="190" y="760" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">live CMMS work order.</text>
</svg>