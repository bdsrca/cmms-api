<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/></filter>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/></marker>
<linearGradient id="soft" x1="0" x2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#ffffff"/></linearGradient>
</defs>
<rect x="0" y="0" width="1400" height="900" fill="#f8fafc"/>
<circle cx="1270" cy="80" r="190" fill="#dbeafe" opacity="0.38"/>
<circle cx="80" cy="820" r="160" fill="#e0f2fe" opacity="0.45"/>
<text x="56" y="72" font-size="36" fill="#0f172a" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif">Public Safety Boundary</text>
<text x="58" y="108" font-size="17" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif">What belongs in a portfolio repo and what must stay private</text>
<rect x="120" y="180" width="500" height="420" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="150" cy="212" r="16" fill="#16a34a"/>
<text x="150" y="218" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">1</text>
<rect x="178" y="202" width="42" height="5" rx="3" fill="#16a34a"/>
<text x="178" y="232" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Safe to show</text>
<text x="144" y="276" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Sanitized architecture, fake</text>
<text x="144" y="295" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">environments, mock tokens,</text>
<text x="144" y="314" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">deterministic model responses,</text>
<text x="144" y="333" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">sample code lists, public-safe</text>
<text x="144" y="352" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">diagrams, unit tests, and demo</text>
<text x="144" y="371" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">scripts.</text>
<rect x="780" y="180" width="500" height="420" rx="20" fill="#ffffff" stroke="#dbeafe" stroke-width="1.4" filter="url(#shadow)"/>
<circle cx="810" cy="212" r="16" fill="#dc2626"/>
<text x="810" y="218" font-size="15" fill="white" text-anchor="middle" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">2</text>
<rect x="838" y="202" width="42" height="5" rx="3" fill="#dc2626"/>
<text x="838" y="232" font-size="18" fill="#0f172a" font-weight="700" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Keep private</text>
<text x="804" y="276" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">Production URLs, raw API keys,</text>
<text x="804" y="295" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">model provider secrets, real work</text>
<text x="804" y="314" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">orders, customer names, internal</text>
<text x="804" y="333" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">prompts, screenshots with tenant</text>
<text x="804" y="352" font-size="13.5" fill="#334155" font-weight="normal" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif">data, and full operational logs.</text>
<line x1="700" y1="170" x2="700" y2="640" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 8"/>
<text x="700" y="700" text-anchor="middle" font-size="22" fill="#0f172a" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif">Good showcase: real engineering thinking, not real private data.</text>
</svg>